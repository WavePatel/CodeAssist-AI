<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | CodeAssist AI</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f3ff;
            color: #1f2937;
        }

        .page {
            max-width: 860px;
            margin: 40px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 28px rgba(17, 24, 39, 0.08);
            padding: 34px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: #6d28d9;
        }

        p {
            line-height: 1.7;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin-top: 20px;
        }

        .btn {
            text-decoration: none;
            display: inline-block;
            padding: 14px;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
        }

        .linkedin {
            background: #0a66c2;
        }

        .instagram {
            background: #e1306c;
        }

        .email {
            background: #334155;
        }

        .edit-note {
            margin-top: 24px;
            font-size: 0.95rem;
            color: #475569;
        }

        .nav {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav a {
            text-decoration: none;
            background: #6d28d9;
            color: #fff;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <main class="page">
        <h1>Contact Us</h1>
        <p>Reach the CodeAssist AI team through the channels below.</p>

        <div class="buttons">
            <a class="btn linkedin" href="https://www.linkedin.com/company/codeassist-ai" target="_blank" rel="noopener noreferrer">LinkedIn</a>
            <a class="btn instagram" href="https://www.instagram.com/codeassist.ai" target="_blank" rel="noopener noreferrer">Instagram</a>
            <a class="btn email" href="mailto:hello@codeassistai.com">Email</a>
        </div>

        <p class="edit-note">
            To update contact links, edit this file directly.
        </p>

        <div class="nav">
            <a href="/">Home</a>
            <a href="/about">About Us</a>
            <a href="/careers">Careers</a>
        </div>
    </main>
</body>
</html>
